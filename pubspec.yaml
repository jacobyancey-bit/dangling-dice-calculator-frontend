name: dangling_dice_calculator
description: "A modern, cross-platform calculator with a clean, responsive UI built with Flutter."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.12.0
  flutter: ">=3.44.0"

dependencies:
  flutter:
    sdk: flutter

  # UI & Icons
  cupertino_icons: ^1.0.8
  google_fonts: ^8.1.0

  # State Management
  riverpod: ^2.6.1
  flutter_riverpod: ^2.6.1

  # Navigation
  go_router: ^17.2.3

  # Math & Calculations
  math_expressions: ^3.1.0

  # Local Storage
  shared_preferences: ^2.2.2

  # UI Utilities
  shimmer: ^3.0.0
  fl_chart: ^1.2.0

  # File & Path Handling
  path_provider: ^2.1.3

  # Utilities
  package_info_plus: ^10.1.0
  url_launcher: ^6.3.0
  share_plus: ^13.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4
  build_runner: ^2.15.0

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/app_icon.png"
  min_sdk_android: 21

flutter:
  generate: true
  uses-material-design: true

  assets:
    - assets/images/

  fonts:
    - family: Roboto
      fonts:
        - asset: assets/fonts/Roboto-Regular.ttf
        - asset: assets/fonts/Roboto-Bold.ttf
          weight: 700
